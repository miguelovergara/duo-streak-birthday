<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUOLINGO STREAK BIRTHDAYS</title>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Duo Streak Birthday - Calculadora de Racha Duolingo",
      "description": "Herramienta online para visualizar hitos, estadísticas y el progreso de la racha de Duolingo de cualquier usuario.",
      "url": "https://duo-streak-birthday.vercel.app/",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "All",
      "author": {
        "@type": "Person",
        "name": "Tu Nombre o Nickname"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Cálculo de hitos de racha",
        "Visualización de estadísticas de Duolingo",
        "Interfaz para compartir logros"
      ],
      "keywords": "duolingo, racha duolingo, duo streak, calculadora de racha, estadísticas duolingo"
    }
    </script>
    
    <!-- Incluye Tailwind CSS (utilizado para el estilo) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Incluye React, ReactDOM y Babel (para ejecutar el JSX) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- adwords -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2703664733389994" crossorigin="anonymous"></script>

    <!-- Configuración para usar la fuente Inter con Tailwind -->
    <style>
      :root {
        font-family: 'Inter', sans-serif;
      }
    </style>
</head>
<body class="bg-gray-100">

    <div id="root">
        <!-- La aplicación React se renderizará aquí -->
    </div>

    <script type="module" src="/src/main.jsx"></script>

</body>
</html>
